name: Veille emploi quotidienne

on:
  schedule:
    - cron: "0 6 * * *"      # tous les jours à 06:00 UTC (08:00 en France l'été)
  workflow_dispatch:           # + un bouton pour lancer à la main

permissions:
  contents: write              # pour réécrire data/ dans le dépôt

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer la veille
        env:
          # Optionnel : ajoute ce secret dans Settings > Secrets pour activer le tri Claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python watcher.py

      - name: Sauvegarder les résultats
        run: |
          git config user.name  "job-watcher"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "Veille du $(date +%F)" || echo "Rien de neuf"
          git push
